[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Bandsintown, ESPN, and Yahoo Finance don't send CORS headers for browser
# requests. These mirror the Vite dev-server proxy in vite.config.ts.
[[redirects]]
  from = "/api/bandsintown/*"
  to = "https://rest.bandsintown.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/espn/*"
  to = "https://site.api.espn.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Reading-queue link enrichment (title + favicon) — see netlify/functions/unfurl.ts.
[[redirects]]
  from = "/api/unfurl"
  to = "/.netlify/functions/unfurl"
  status = 200
  force = true

# "Generate Widget" (OpenAI) — see netlify/functions/generate-widget.ts.
# Requires OPENAI_API_KEY (and optionally OPENAI_MODEL) in the site env.
[[redirects]]
  from = "/api/generate-widget"
  to = "/.netlify/functions/generate-widget"
  status = 200
  force = true

# Generated-widget runtime data: widget.ai() lookups (OpenAI + web search)
# and the JSON CORS-fallback proxy for widget.getJSON().
[[redirects]]
  from = "/api/widget-data"
  to = "/.netlify/functions/widget-data"
  status = 200
  force = true

[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true
