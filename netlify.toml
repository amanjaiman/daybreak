[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Bandsintown, ESPN, and Yahoo Finance don't send CORS headers for browser
# requests. These mirror the Vite dev-server proxy in vite.config.ts.
[[redirects]]
  from = "/api/bandsintown/*"
  to = "https://rest.bandsintown.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/espn/*"
  to = "https://site.api.espn.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Reading-queue link enrichment (title + favicon) — see netlify/functions/unfurl.ts.
[[redirects]]
  from = "/api/unfurl"
  to = "/.netlify/functions/unfurl"
  status = 200
  force = true

# Generated-widget AI backends now run on Supabase edge functions, called
# directly by the frontend with the publishable key (no redirect here):
#   - generate-widget / widget-status — the async "Generate Widget" job
#   - widget-data — runtime widget.ai() lookups (gpt-5 + web search; needs more
#     than Netlify's ~26s synchronous ceiling)
# Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in the site env. See
# supabase/functions/.

# The JSON CORS-fallback proxy for widget.getJSON() is a fast server-side fetch
# with no timeout concern, so it stays a Netlify function.
[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true
